<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Policy-as-Code Platform{% endblock %}</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Code editor styling */
        .code-editor {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            tab-size: 4;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <svg class="w-8 h-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                        <span class="text-xl font-bold text-gray-900">Policy-as-Code</span>
                    </a>
                    <!-- Desktop Navigation -->
                    <div class="hidden md:flex ml-10 space-x-4">
                        <a href="/dashboard" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">Dashboard</a>
                        <a href="/policies" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">Policies</a>
                        <a href="/users" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">Users</a>
                        <a href="/audit" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">Audit Logs</a>
                        <a href="/test" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">Test Policy</a>
                        <a href="/api-docs" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary-600 hover:bg-gray-100">API Docs</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="opa-status" class="flex items-center text-sm">
                        <span class="w-2 h-2 rounded-full bg-gray-400 mr-2"></span>
                        <span class="text-gray-500">Checking OPA...</span>
                    </span>
                    <div id="auth-buttons">
                        <a href="/login" class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-md hover:bg-primary-700">Login</a>
                        <a href="/register" class="ml-2 px-4 py-2 text-sm font-medium text-primary-600 border border-primary-600 rounded-md hover:bg-primary-50">Register</a>
                    </div>
                    <div id="user-info" class="hidden flex items-center space-x-3">
                        <span id="user-name" class="text-sm font-medium text-gray-700"></span>
                        <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex justify-between items-center">
                <p class="text-sm text-gray-500">
                    Policy-as-Code Platform - Academic Project
                </p>
                <p class="text-sm text-gray-500">
                    Built with Flask, OPA, and Tailwind CSS
                </p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // Store JWT token in localStorage
        const AUTH_TOKEN_KEY = 'pac_auth_token';
        const AUTH_USER_KEY = 'pac_user';

        function getToken() {
            return localStorage.getItem(AUTH_TOKEN_KEY);
        }

        function setToken(token) {
            localStorage.setItem(AUTH_TOKEN_KEY, token);
        }

        function getUser() {
            const user = localStorage.getItem(AUTH_USER_KEY);
            return user ? JSON.parse(user) : null;
        }

        function setUser(user) {
            localStorage.setItem(AUTH_USER_KEY, JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem(AUTH_TOKEN_KEY);
            localStorage.removeItem(AUTH_USER_KEY);
            window.location.href = '/login';
        }

        // API helper function
        async function apiCall(url, method = 'GET', data = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            const token = getToken();
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }

            if (data) {
                options.body = JSON.stringify(data);
            }

            const response = await fetch(url, options);
            return response.json();
        }

        // Check OPA status on page load
        async function checkOPAStatus() {
            const statusEl = document.getElementById('opa-status');
            try {
                const token = getToken();
                if (token) {
                    const result = await apiCall('/policy/opa-status');
                    if (result.data && result.data.opa_healthy) {
                        statusEl.innerHTML = `
                            <span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span>
                            <span class="text-green-600">OPA Connected</span>
                        `;
                    } else {
                        statusEl.innerHTML = `
                            <span class="w-2 h-2 rounded-full bg-yellow-500 mr-2"></span>
                            <span class="text-yellow-600">OPA Fallback Mode</span>
                        `;
                    }
                } else {
                    statusEl.innerHTML = `
                        <span class="w-2 h-2 rounded-full bg-gray-400 mr-2"></span>
                        <span class="text-gray-500">Login Required</span>
                    `;
                }
            } catch (e) {
                statusEl.innerHTML = `
                    <span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span>
                    <span class="text-red-600">Error</span>
                `;
            }
        }

        // Update UI based on login status
        function updateAuthUI() {
            const user = getUser();
            const authButtons = document.getElementById('auth-buttons');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            
            if (user) {
                authButtons.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userName.textContent = `${user.username} (${user.role})`;
            } else {
                authButtons.classList.remove('hidden');
                userInfo.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkOPAStatus();
            updateAuthUI();
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
